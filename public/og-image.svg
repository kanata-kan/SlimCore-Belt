<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1628"/>
      <stop offset="50%" style="stop-color:#0C3DC4"/>
      <stop offset="100%" style="stop-color:#00B5A3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1554E8"/>
      <stop offset="100%" style="stop-color:#00B5A3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="white" opacity="0.06"/>
  <rect x="80" y="80" width="1040" height="470" rx="20" fill="white" opacity="0.04"/>

  <!-- Product area -->
  <rect x="640" y="120" width="440" height="390" rx="20" fill="white" opacity="0.1"/>
  <text x="860" y="300" text-anchor="middle" font-family="sans-serif" font-size="72" fill="white" font-weight="bold">SlimCore</text>
  <text x="860" y="370" text-anchor="middle" font-family="sans-serif" font-size="28" fill="white" opacity="0.7">حزام التنحيف</text>
  <text x="860" y="430" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#00B5A3">ضع صورة المنتج هنا</text>

  <!-- Text content -->
  <text x="480" y="200" text-anchor="end" font-family="sans-serif" font-size="56" fill="white" font-weight="bold">أخفِ بطنك فوراً</text>
  <text x="480" y="270" text-anchor="end" font-family="sans-serif" font-size="28" fill="white" opacity="0.8">بدون رياضة ولا ريجيم</text>

  <!-- Price badge -->
  <rect x="280" y="310" width="200" height="70" rx="16" fill="url(#accent)"/>
  <text x="380" y="355" text-anchor="middle" font-family="sans-serif" font-size="32" fill="white" font-weight="bold">199 درهم</text>

  <!-- Trust badges -->
  <text x="480" y="440" text-anchor="end" font-family="sans-serif" font-size="20" fill="#00B5A3">🚚 توصيل مجاني</text>
  <text x="480" y="475" text-anchor="end" font-family="sans-serif" font-size="20" fill="#00B5A3">💰 الدفع عند الاستلام</text>
  <text x="480" y="510" text-anchor="end" font-family="sans-serif" font-size="20" fill="#00B5A3">📦 +1200 طلب في المغرب</text>
</svg>
